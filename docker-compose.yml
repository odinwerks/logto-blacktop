# This compose file is for demonstration only, do not use in prod.
services:
  app:
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    image: svhd/logto:${TAG-latest}
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm run cli db system set storageProvider '{\"provider\":\"S3Storage\",\"endpoint\":\"http://rustfs:9000\",\"bucket\":\"logto\",\"forcePathStyle\":true,\"accessKeyId\":\"rustfsadmin\",\"accessSecretKey\":\"rustfsadmin\"}' && npm start"]
    ports:
      - 3001:3001
      - 3002:3002
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://postgres:p0stgr3s@postgres:5432/logto
      # Optional default grace period, in seconds, for OIDC private key rotation when the API
      # request omits `rotationGracePeriod`.
      - PRIVATE_KEY_ROTATION_GRACE_PERIOD
      # Mandatory for GitPod to map host env to the container, thus GitPod can dynamically configure the public URL of Logto;
      # Or, you can leverage it for local testing.
      - ENDPOINT
      - ADMIN_ENDPOINT
  postgres:
    image: postgres:17-alpine
    user: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p0stgr3s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - 3003:9000
      - 3004:9001
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    volumes:
      - ./data/rustfs/data:/data
      - ./data/rustfs/logs:/logs
  rustfs-init:
    image: minio/mc:latest
    depends_on:
      - rustfs
    entrypoint: |
      /bin/sh -c "
      sleep 15;
      mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin;
      mc mb --ignore-existing rustfs/logto;
      "
